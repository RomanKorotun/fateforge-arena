services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: node_api_dev
    container_name: api_dev
    env_file:
      - .env.development
    ports:
      - "3799:3799"
    volumes:
      - ./backend:/app
      - node_app_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres_dev
    restart: on-failure
    ports:
      - "5439:5432"
    env_file:
      - .env.development
    volumes:
      - pg-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

volumes:
  node_app_modules:
  pg-data-dev:
  redis-data-dev:
